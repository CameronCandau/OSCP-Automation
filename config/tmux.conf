# OSCP tmux config
# Install: cp tmux.conf ~/.tmux.conf
#
# First-time setup:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   tmux source ~/.tmux.conf
#   prefix + I  (capital i) to install plugins
#
# Prefix is Ctrl+b (default - kept so it doesn't conflict with wezterm bindings)

# ── Appearance ──────────────────────────────────────────────────────────────
set -g default-terminal "screen-256color"
set -g status-style bg=colour235,fg=colour137
set -g status-left  "#[fg=green][#S] "
set -g status-right "#[fg=yellow]#(cat #{pane_current_path}/.target 2>/dev/null | tr -d '\n' | sed 's/^/IP: /') #[fg=white]%H:%M"
set -g status-right-length 60

# Highlight active window in status bar
setw -g window-status-current-style fg=colour81,bold
setw -g window-status-current-format " #I:#W "

# ── Behaviour ───────────────────────────────────────────────────────────────
set -g history-limit 50000
set -g mouse on
set -sg escape-time 0          # No delay for escape key (important for vim)
set -g base-index 1            # Windows start at 1 (easier to reach on keyboard)
setw -g pane-base-index 1

# ── Key bindings ─────────────────────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# Split panes (more intuitive: | and -)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigate panes with Alt+arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# ── Logging (tmux-logging plugin) ────────────────────────────────────────────
# prefix + shift+P : toggle logging for current pane
# prefix + alt+P   : save visible pane to screenshot file
# Logs saved to ~/oscp/logs/ with session/window/pane in filename
set -g @logging-path "$HOME/oscp/logs"
set -g @logging-filename "#{session_name}-#{window_name}-#{pane_index}-%Y%m%d.log"

# Auto-start logging on every new pane/window
set-hook -g after-new-session  'run "~/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'
set-hook -g after-new-window   'run "~/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'
set-hook -g after-split-window 'run "~/.tmux/plugins/tmux-logging/scripts/toggle_logging.sh"'

# ── Plugins ──────────────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'   # Sane defaults
set -g @plugin 'tmux-plugins/tmux-logging'    # Auto-log all pane output

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
